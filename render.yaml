services:
  - type: web
    name: linkup
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CLIENT_URL
        value: https://linkup.onrender.com
      - key: UPLOADS_DIR
        value: /app/uploads
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: linkup-db
          property: connectionString
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1

databases:
  - name: linkup-db
    plan: free
