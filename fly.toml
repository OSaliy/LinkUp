app = "linkup-chat"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  UPLOADS_DIR = "/app/uploads"

[deploy]
  release_command = "npx prisma db push --accept-data-loss --skip-generate"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 300
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "linkup_uploads"
  destination = "/app/uploads"
  initial_size = "1gb"
